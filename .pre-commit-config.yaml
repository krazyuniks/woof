repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: ruff-format-check
        name: ruff format --check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: validate-woof-config
        name: validate woof config
        entry: uv run woof validate .woof/prerequisites.toml .woof/agents.toml .woof/quality-gates.toml
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: pytest
        name: pytest
        entry: env PYTHONDONTWRITEBYTECODE=1 uv run pytest -p no:cacheprovider
        language: system
        pass_filenames: false
        stages: [pre-push]
