# Woof self-hosting agent role configuration.

[roles.orchestrator]
adapter = "in-session"

[roles.primary]
adapter = "codex"
model = "gpt-5.5"

[roles.reviewer]
adapter = "claude"
model = "claude-opus-4-7"

[roles.gate-resolver]
adapter = "in-session"

[timeouts]
default_minutes = 30

[review_valve]
every_n_stories = 5
end_of_epic = true

[audit]
enabled = true
max_bytes = 262144
redact_patterns = []
