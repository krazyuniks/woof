# Woof self-hosting repo-local policy.

schema_version = 1
default_run_profile = "woof-codex-high-produce-glm-max-review"

[delivery]
profile = "B"
repo_root = "."
toolchain_root = "."
base_branch = "main"

[profiles.A]
github_repo = "krazyuniks/woof"
ready_label = "ready"
merge_path_groups = ["default"]
terminal_deploy_checks = []
mergeability_settle_timeout = 15
deploy_wait_timeout = 300

[profiles.A.worktree]
root = ".vf-worktrees"

[profiles.B]
commit = true
push = true

[verification]
command = "just check"
timeout_seconds = 600

[run_profiles.woof-codex-high-produce-glm-max-review.producer]
harness = "codex"
model = "gpt-5.5"
effort = "high"

[run_profiles.woof-codex-high-produce-glm-max-review.reviewer]
harness = "glm"
model = "glm-5.2"
effort = "max"

[checks]
floor = [
  "quality-gates",
  "outcome-markers",
  "scope",
  "contract-refs",
  "plan-crossrefs",
  "critique-blocker",
  "commit-transaction",
  "docs-drift",
  "review-valve",
]

[checks.review_size]
max_non_generated_changed_lines = 500

[cartography]
floor = "structural"

[drain]
merge_after_ready_pr = false
rerun_after_merge = true
mark_unit_done_after_publish = true
commit_backlog_state = true
stop_when_no_eligible_units = true
