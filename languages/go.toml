# woof language registry — Go
#
# Schema: woof/schemas/language-registry.schema.json
# Validate: just woof validate --schema language-registry languages/go.toml
#
# Consumed by `woof preflight` to install/verify Go tooling when a
# project's prerequisites declare Go as a target language.

[lsp]
binary = "gopls"
binary_install = "go install golang.org/x/tools/gopls@latest"
gotchas = [
  "Requires the Go toolchain on PATH",
  "Ensure $(go env GOPATH)/bin is on PATH so the gopls binary resolves",
  "Module-aware mode requires go.mod at the workspace root",
]

[tree-sitter]
grammar_install = "npm install -g tree-sitter-go"
verify_snippet = "package main"
verify_scope = "source.go"
