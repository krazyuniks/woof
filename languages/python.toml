# woof language registry — Python
#
# Schema: woof/schemas/language-registry.schema.json
# Validate: just woof-validate woof/languages/python.toml
#
# Consumed by `just wf-preflight` to install/verify Python tooling when a
# project's prerequisites declare Python as a target language.

[lsp]
binary = "pyright"
binary_install = "npm install -g pyright"
gotchas = [
  "Configure in pyproject.toml under [tool.pyright]",
  "Virtualenv: set venvPath in pyright config",
  "Monorepo: use executionEnvironments to scope per-package settings",
]

[tree-sitter]
grammar_install = "npm install -g tree-sitter-python"
verify_snippet = "def f(): pass"
verify_scope = "source.python"
