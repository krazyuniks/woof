# woof language registry — Rust
#
# Schema: woof/schemas/language-registry.schema.json
# Validate: just woof validate --schema language-registry languages/rust.toml
#
# Consumed by `woof preflight` to install/verify Rust tooling when a
# project's prerequisites declare Rust as a target language.

[lsp]
binary = "rust-analyzer"
binary_install = "rustup component add rust-analyzer"
gotchas = [
  "Requires rustup; install from https://rustup.rs if absent",
  "Initial workspace indexing can take minutes on large crates",
  "For proc-macros, enable rust-analyzer.cargo.runBuildScripts",
  "Exclude target/ from indexing to avoid spurious diagnostics",
]

[tree-sitter]
grammar_install = "npm install -g tree-sitter-rust"
verify_snippet = "fn main() {}"
verify_scope = "source.rust"
